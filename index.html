<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NYC 5-Day Weather Forecast</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #eef2f3;
    }
    .widget-container {
      width: 90%;
      height: 90%;
    }
    .weatherwidget-io {
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body>

  <div class="widget-container">
    <a class="weatherwidget-io" href="https://forecast.weatherwidget.io/New%20York%2C%20NY" data-days="5" data-theme="original">New York, NY Weather</a>
  </div>

  <script>
  !function(d,s,id){
    var js,fjs=d.getElementsByTagName(s)[0];
    if(!d.getElementById(id)){
      js=d.createElement(s);
      js.id=id;
      js.src='https://weatherwidget.io/js/widget.min.js';
      fjs.parentNode.insertBefore(js,fjs);
    }
  }(document,'script','weatherwidget-io-js');
  </script>

</body>
</html>
