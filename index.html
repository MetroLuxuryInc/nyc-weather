<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NYC Weather Map</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <!-- OpenWeatherMap Interactive NYC Map -->
  <iframe 
    src="https://openweathermap.org/weathermap?basemap=map&cities=true&layer=temperature&lat=40.7128&lon=-74.0060&zoom=11" 
    title="NYC Weather Map">
  </iframe>

</body>
</html>
