<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NYC 5-Day Weather Forecast</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0f0f0;
    }

    #weather-container {
      width: 90%;
      max-width: 1200px;
      min-width: 400px;
    }

    .weatherwidget-io {
      width: 100% !important;
      height: 600px; /* widget sets own height, can increase for full page */
    }
  </style>
</head>
<body>

  <div id="weather-container">
    <a class="weatherwidget-io" 
       href="https://forecast.weatherwidget.io/New%20York%2C%20NY" 
       data-days="5" 
       data-theme="original">
       New York, NY Weather
    </a>
  </div>

  <script>
    !function(d,s,id){
      var js,fjs=d.getElementsByTagName(s)[0];
      if(!d.getElementById(id)){
        js=d.createElement(s);
        js.id=id;
        js.src='https://weatherwidget.io/js/widget.min.js';
        fjs.parentNode.insertBefore(js,fjs);
      }
    }(document,'script','weatherwidget-io-js');
  </script>

</body>
</html>
